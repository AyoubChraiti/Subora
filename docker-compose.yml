services:
  db:
    image: postgres:16-alpine
    container_name: subora-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-subora}
      POSTGRES_USER: ${POSTGRES_USER:-subora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-subora_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subora} -d ${POSTGRES_DB:-subora}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: subora-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://subora:subora_password@db:5432/subora}
      SECRET_KEY: ${SECRET_KEY:-replace_with_a_long_random_secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: subora-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
